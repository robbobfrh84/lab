<!DOCTYPE html><html lang='en'>
<title>Block Snake</title>
<link rel='icon' href='assets/bob8x8_headband.png'> 
<head>
  <meta charset='UTF-8'><meta http-equiv='X-UA-Compatible' content='ie=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <link rel='stylesheet' href='css/main.css'>
  <link rel='stylesheet' href='css/mobile.css'>
</head>
<body>

  <div class="grid-container">

    <div id="start_restart_btn" class="nav-info-overlay">
      <span> Click or Tap <br/> to <br/> START</span>
    </div>

    <h1>Block Snake</h1>

    <section class="info-section">
      <div>High Score: <span id="highScore"></span></div>
      <div>Score: <span id="score"></span></div>
    </section>

    <div id="grid1" class="grid"></div>

    <section class="controller-section">
      <div class="arrow-container">

        <div class="leftRight-container">
          <button id="ArrowLeftBtn" class="arrowBtn left">
            <div style="transform: rotate(-90deg);">▲</div>
          </button>
        </div>

        <div class="upDown-container">
          <button id="ArrowUpBtn" class="arrowBtn up">▲</button>
          <button id="ArrowDownBtn" class="arrowBtn down">▼</button>
        </div>

        <div class="leftRight-container">
          <button id="ArrowRightBtn" class="arrowBtn right">
            <div style="transform: rotate(90deg);">▲</div>
          </button>
        </div>

      </div>
    </section>

    <!-- * 📱 Mobile 📱  -->
    <section class="dpad-section">
      <button id="dpUp"    class="dpBtn up"><div>▲</div></button>
      <button id="dpDown"  class="dpBtn down"><div>▼</div></button>
      <button id="dpLeft"  class="dpBtn left">
        <div style="transform: rotate(-90deg);">▲</div>
      </button>
      <button id="dpRight" class="dpBtn right">
        <div style="transform: rotate(90deg);">▲</div>
      </button>
    </section>

  </div>
</body>
<script src='settings.js'></script>
<script src='build.js'></script>
<script src='events.js'></script>
<script src='game.js'></script>
<script> build() </script>
</html>
