    <h1>Block Snake</h1>

      <div>High Score: <span id="highScore"></span></div>

    </section>

    <div id="grid1" class="grid"></div>

    <section class="controller-section">
      <div class="arrow-container">

        <div class="leftRight-container">

          <button id="ArrowRightBtn" class="arrowBtn right">▶</button>
        </div>

      </div>
    </section>
