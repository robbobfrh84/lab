<!DOCTYPE html><html lang='en'>

<head>
  <meta charset='UTF-8'><meta http-equiv='X-UA-Compatible' content='ie=edge'>

  <link rel='stylesheet' href='../main.css'>

<body>

  <div id="allContainer">

    <header>

      <h1>TOC - Create</h1>

      <h3 id="matchSheetName">. . .</h3>

      <nav class="nav-container">
        <span>
          • <a href="../index.html">Home</a>

        <span>
          • <a href="../Match/index.html">Match</a>
        </span>
        <span>

        </span>
      </nav>

    </header>

    <div class="create-container"> 

      <div class="label-row">
        <label class="create-label">name:</label>
        <input type="text" id="nameInput"> 
        <span class="small-font"> * Max 16 chars </span> 
      </div>

      <div class="label-row">
        <label class="create-label">region:</label>
        <input type="text" id="regionInput" placeholder="...Highland, Valley, etc...">
        <span class="small-font"> * Max 16 chars </span> 
      </div>

      <div class="button-container">
        <button onclick="createCharecter()" class="green-btn btn">
          Create
        </button> 
      </div>

      <div id="loader"><div class="spinner"></div></div>

      <div id="createNote"></div>

    </div>

  </div>

</body>
