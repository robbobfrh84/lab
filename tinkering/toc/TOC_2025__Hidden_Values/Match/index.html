<!DOCTYPE html><html lang='en'>
<title>TOC - Match</title> 

<head>
  <meta charset='UTF-8'><meta http-equiv='X-UA-Compatible' content='ie=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no'>
  <link rel='stylesheet' href='../main.css'>
  <link rel='stylesheet' href='./match.css'>
</head>

<body>
  
  <div id="allContainer">

    <header>

      <h1>TOC - Match</h1>

      <h3 id="matchSheetName">. . .</h3>

      <nav class="nav-container">
        <span>
          • <a href="../index.html">Home</a>
        </span>
        <span>
          • <a href="../Create/index.html">Create</a>
        </span>
        <span>
          • <a href="https://docs.google.com/spreadsheets/d/1JIXolkM-XXJJdzm33evUv-zXYT6XGuliEZmt4B4UdHw">gSheet</a>
        </span>
      </nav>

    </header>
  
    <div class="charSelect-container">

      <input id="topUserInput" 
        placeholder="Type to filter..." 
        onfocus="clickInInput('top', 'bot')"
        oninput="filterChars('top')"
      >
      <div id="topSelected"></div>

      <div class="divider"> <span> ----- </span> <span> vs </span> <span> ----- </span> </div>

      <input id="botUserInput" 
        placeholder="Type to filter..." 
        onfocus="clickInInput('bot', 'top')"
        oninput="filterChars('bot')"
      >
      <div id="botSelected"></div>

      <div id="charSelect"></div>

      <div id="loader"><div class="spinner"></div></div>

    </div>

    <div id="matchContainer"></div>

  </div>

</body>

<script src='../Gasup_v1.1.0.js'></script>
<script src='../getSheet.js'></script>
<script src='match.js'></script>
<script src='../table/table.js'></script>
<script src='../config.js'></script>

</html>
