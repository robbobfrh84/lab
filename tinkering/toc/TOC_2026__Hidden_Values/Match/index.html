<!DOCTYPE html><html lang='en'>
<title>TOC - Match</title> 

<head>
  <meta charset='UTF-8'><meta http-equiv='X-UA-Compatible' content='ie=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no'>
  <link rel='stylesheet' href='../main.css'>
  <link rel='stylesheet' href='./match.css'>
  <link rel='stylesheet' href='./updateMatch.css'>
</head>

<body>
  
  <div id="allContainer">

    <header>

      <h1>TOC - Match</h1>

      <h3 id="matchSheetName">. . .</h3>

      <nav class="nav-container">
        <span>
          • <a href="../index.html">Home</a>
        </span>
        <span>
          • <a href="../Create/index.html">Create</a>
        </span>
        <span>
          • <a href="https://docs.google.com/spreadsheets/d/1JIXolkM-XXJJdzm33evUv-zXYT6XGuliEZmt4B4UdHw">gSheet</a>
        </span>
      </nav>

    </header>

    <main>
      
      <div id="selectContainer">

        <div id="charSelect"></div>

        <div class="selectInputs">

          <input id="topUserInput" 
            placeholder="Type to filter..." 
            onfocus="clickInInput('top', 'bot')"
            oninput="filterChars('top')"
          > 
          <div id="topSelected" class="selectedCharContainer"></div>

          <div class="vsDivider"> ----- vs ----- </div>

          <input id="botUserInput" 
            placeholder="Type to filter..." 
            onfocus="clickInInput('bot', 'top')"
            oninput="filterChars('bot')"
          >
          <div id="botSelected" class="selectedCharContainer"></div>

          <div class="match-btn-container">
            <button class="red-btn btn" onclick="resetInputs()">Clear</button>
            <button id="officialMatchBtn" class="green-btn btn" aria-disabled="true" onclick="swapViews(true)">Offical Match</button>
            <button id="sparBtn" class="yellow-btn btn" aria-disabled="true" onclick="swapViews(false)">Spar</button>
          </div>

        </div>

      </div>

      <div id="matchContainer">
        <div id="matchCard">
          <div id="matchTop"></div>
          <div class="results-container">
            <div id="topWinner" class="winner-container"></div>
            <div id="scoreCard">VS</div>
            <div id="botWinner" class="winner-container"></div>
          </div>
          <div id="matchBot"></div>
        </div>
        <div id="matchTypeLabel"></div>
        <div id="matchControls">
          <div class="match-controls-left">
            <button class="red-btn btn" onclick="cancelMatch()">Cancel</button>
          </div>
          <div class="match-controls-right">
            <button class="yellow-btn btn" onclick="scoreRoundSimulation()">Score Round ></button>
            <button class="green-btn btn" onclick="finishSimulation()">Finish >></button>
          </div>
          <div id="updateLoader"><div class="spinner"></div></div>
        </div>
        <button id="newMatchBtn" class="red-btn btn" onclick="cancelMatch()">New Match</button>
      </div>

      <div id="loader"><div class="spinner"></div></div>

    </main>

  </div>

</body>

<script src='../Gasup_v1.1.0.js'></script>
<script src='../encodeDecode.js'></script>
<script src='../getSheet.js'></script>
<script src='match.js'></script>
<script src='simulate.js'></script>
<script src='updateMatch.js'></script>
<script src='../table/table.js'></script>
<script src='../config.js'></script>

</html>
